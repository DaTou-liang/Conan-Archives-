<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>名侦探柯南 · 侦探档案馆｜存档码版</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #0a0c14; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 16px; }
  .app-container { max-width: 550px; width: 100%; background: #111827; border-radius: 36px; padding: 20px 18px 28px; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.5); position: relative; overflow-x: hidden; }
  .title-area { text-align: center; margin-bottom: 12px; }
  .main-title { font-size: 28px; font-weight: 800; color: #f5c518; letter-spacing: 2px; }
  .sub { font-size: 11px; color: #9ca3af; margin-top: 4px; }
  
  /* 侦探等级面板 */
  .rank-panel { background: linear-gradient(135deg, #1a1f2e, #0f1119); border-radius: 20px; padding: 10px 14px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; border: 1px solid #2d3748; }
  .rank-icon { font-size: 38px; background: #2d3748; width: 52px; height: 52px; border-radius: 26px; display: flex; align-items: center; justify-content: center; }
  .rank-info { flex: 1; }
  .rank-name { font-size: 12px; color: #f5c518; font-weight: bold; }
  .rank-title { font-size: 16px; font-weight: 800; color: white; }
  .exp-bar { background: #1e293b; border-radius: 20px; height: 6px; margin-top: 6px; overflow: hidden; }
  .exp-fill { background: #f5c518; width: 0%; height: 100%; transition: width 0.3s ease; }
  .exp-text { font-size: 9px; color: #9ca3af; margin-top: 4px; text-align: right; }
  
  /* 闪切特效 */
  .flash-effect { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 70px; opacity: 0; pointer-events: none; z-index: 1000; text-shadow: 0 0 20px rgba(245,197,24,0.8); white-space: nowrap; }
  .flash-effect.show { opacity: 0.8; animation: flashPop 0.5s ease-out forwards; }
  @keyframes flashPop { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } 20% { opacity: 0.9; transform: translate(-50%, -50%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1); } }
  
  /* 抖动动画 */
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
  
  /* 升级弹窗 */
  .levelup-toast { position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(135deg, #f5c518, #f97316); color: #0a0c14; padding: 14px 22px; border-radius: 60px; font-weight: 800; font-size: 17px; z-index: 1001; animation: levelUpAnim 0.6s ease-out forwards; white-space: nowrap; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  @keyframes levelUpAnim { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } 30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); } 70% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -60%) scale(0.8); } }
  
  /* 每日悬赏和错题特训室卡片 */
  .daily-card, .wrong-card { border-radius: 20px; padding: 14px; margin: 12px 0; cursor: pointer; transition: transform 0.1s; }
  .daily-card:active, .wrong-card:active { transform: scale(0.98); }
  .daily-card { background: linear-gradient(135deg, #1e2a3a, #0f172a); border: 1px solid #f5c51830; }
  .wrong-card { background: #1e1a2a; border: 1px solid #ef444430; }
  .daily-title { font-size: 14px; color: #f5c518; font-weight: bold; margin-bottom: 6px; }
  .wrong-title { font-size: 14px; color: #f87171; font-weight: bold; margin-bottom: 6px; }
  .daily-desc, .wrong-desc { font-size: 11px; color: #9ca3af; }
  .daily-reward { font-size: 10px; color: #4ade80; margin-top: 6px; }
  .daily-completed { opacity: 0.6; pointer-events: none; }
  
  .share-card { background: #1e293b; border-radius: 16px; padding: 10px; margin-top: 14px; text-align: center; cursor: pointer; border: 1px solid #3b82f630; font-size: 13px; }
  .share-card:active { background: #2d3a4e; }
  
  .panel { display: none; opacity: 0; will-change: opacity; }
  .panel.active { display: block; opacity: 1; animation: fadeInPanel 0.25s ease forwards; }
  @keyframes fadeInPanel { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  
  .mode-buttons { display: flex; gap: 14px; margin: 16px 0 12px; }
  .mode-btn { flex: 1; padding: 14px 0; border-radius: 60px; border: none; font-weight: 700; font-size: 17px; cursor: pointer; background: #1e293b; color: white; transition: transform 0.1s; }
  .mode-btn:active { transform: scale(0.96); }
  .btn-casual { background: #2563eb; }
  .btn-reasoning { background: #dc2626; }
  .secondary-btn { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(245,197,24,0.3); border-radius: 40px; padding: 12px; color: #f5c518; font-weight: 600; cursor: pointer; margin-top: 10px; }
  .archive-btns { display: flex; gap: 10px; margin-top: 10px; }
  .archive-btn { flex: 1; background: #2d3748; border: 1px solid rgba(245,197,24,0.3); border-radius: 40px; padding: 10px; color: #f5c518; font-weight: 600; cursor: pointer; text-align: center; }
  .archive-btn:active { background: #3d4a60; }
  .case-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .back-icon { background: rgba(255,255,255,0.08); border: none; color: white; width: 36px; height: 36px; border-radius: 40px; font-size: 20px; cursor: pointer; }
  .case-grid { max-height: 58vh; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; }
  .case-card { background: rgba(255,255,255,0.04); border-radius: 20px; padding: 14px 16px; border: 1px solid #2d3748; cursor: pointer; transition: background 0.1s; }
  .case-card:active { background: rgba(255,255,255,0.08); transform: scale(0.98); }
  .case-name { font-weight: 700; color: #f3f4f6; display: flex; justify-content: space-between; }
  .case-solved-mark { color: #22c55e; font-size: 13px; }
  .case-desc { font-size: 11px; color: #9ca3af; margin-top: 6px; }
  .quiz-info { display: flex; justify-content: space-between; font-size: 13px; color: #cbd5e1; margin-bottom: 12px; }
  .progress-bar { background: #1e293b; border-radius: 20px; height: 6px; margin-bottom: 20px; overflow: hidden; }
  .progress-fill { background: #f5c518; width: 0%; height: 100%; transition: width 0.2s ease; }
  .question-card { background: #0f172a; border-radius: 28px; padding: 22px 20px; border: 1px solid #2d3748; margin-bottom: 18px; }
  .question-text { color: white; font-size: 18px; font-weight: 500; line-height: 1.45; }
  .options-area { display: flex; flex-direction: column; gap: 12px; }
  .option { background: rgba(255,255,255,0.05); border: 1px solid #334155; border-radius: 60px; padding: 14px 20px; color: #e2e8f0; font-size: 15px; cursor: pointer; transition: background 0.08s; }
  .option:active { transform: scale(0.98); background: #334155; }
  .option.correct { background: #14532d; border-color: #22c55e; }
  .option.wrong { background: #7f1d1d; border-color: #ef4444; animation: shake 0.3s ease; }
  .option.disabled { pointer-events: none; opacity: 0.5; background: #1e293b; text-decoration: line-through; }
  .next-btn { width: 100%; background: #f97316; border: none; border-radius: 60px; padding: 15px; font-weight: 800; color: white; margin-top: 22px; cursor: pointer; }
  .next-btn.hide { display: none; }
  .feedback { background: #0f172a; border-radius: 24px; padding: 14px 18px; margin-top: 16px; text-align: center; display: none; border-left: 4px solid #f5c518; }
  .feedback.show { display: block; animation: fadeIn 0.2s; }
  .fb-correct { color: #4ade80; }
  .fb-wrong { color: #f87171; }
  .result-box { text-align: center; padding: 16px 8px; }
  .result-score { font-size: 48px; font-weight: 900; color: #f5c518; margin: 12px 0; }
  .result-stats { background: #0f172a; border-radius: 24px; padding: 14px; margin: 16px 0; }
  .badge-toast { background: #f5c518; color: #0a0c14; padding: 10px 16px; border-radius: 60px; font-weight: 800; display: inline-block; margin: 10px auto; animation: fadeScale 0.4s ease; }
  @keyframes fadeScale { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
  .badge-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-top: 20px; max-height: 55vh; overflow-y: auto; }
  .badge-item { background: #1e293b; border-radius: 20px; padding: 12px 4px; text-align: center; opacity: 0.55; transition: opacity 0.1s; }
  .badge-item.earned { opacity: 1; background: #f5c51815; border: 1px solid #f5c518; }
  .badge-icon { font-size: 32px; }
  .badge-name { font-size: 10px; color: #cbd5e1; margin-top: 6px; }
  .earned .badge-name { color: #f5c518; }
  .door-stage { text-align: center; margin: 8px 0 16px; }
  .door-box { width: 200px; height: 90px; margin: 0 auto; background: #2d2a1e; border-radius: 14px; position: relative; overflow: hidden; border: 2px solid #f5c518; cursor: pointer; }
  .door-left, .door-right { position: absolute; top: 0; width: 50%; height: 100%; background: #5c3b1f; transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1); will-change: transform; }
  .door-left { left: 0; border-right: 1px solid #f5c518; }
  .door-right { right: 0; border-left: 1px solid #f5c518; }
  .door-open .door-left { transform: translateX(-100%); }
  .door-open .door-right { transform: translateX(100%); }
  .door-text { position: relative; top: 34px; color: #f5c518; font-weight: bold; font-size: 12px; }
  .sound-tip { text-align: center; font-size: 10px; color: #6b7280; margin-top: 12px; }
  .memory-note { text-align: center; font-size: 10px; color: #4b5563; margin-top: 12px; border-top: 1px solid #1f2937; padding-top: 10px; }
</style>
</head>
<body>
<div class="app-container" id="appRoot">
  <div class="title-area"><div class="main-title">🕵️ 名侦探柯南</div><div class="sub">完全推理档案 · 错题永久记忆</div></div>
  
  <!-- 侦探等级面板 -->
  <div class="rank-panel" id="rankPanel">
    <div class="rank-icon" id="rankIcon">🔍</div>
    <div class="rank-info">
      <div class="rank-name" id="rankName">见习侦探</div>
      <div class="rank-title" id="rankTitle">👓 等级1</div>
      <div class="exp-bar"><div class="exp-fill" id="expFill"></div></div>
      <div class="exp-text" id="expText">0 / 100 EXP</div>
    </div>
  </div>
  
  <div id="mainMenuPanel" class="panel active">
    <div class="door-stage" id="doorStage"><div class="door-box" id="doorBox"><div class="door-left"></div><div class="door-right"></div><div class="door-text">🔑 点击开启档案馆</div></div></div>
    
    <!-- 每日悬赏 -->
    <div class="daily-card" id="dailyChallengeBtn">
      <div class="daily-title">📅 本日案件 · 悬赏中</div>
      <div class="daily-desc">每日5道题，全对得特殊勋章+经验</div>
      <div class="daily-reward">🏅 奖励：「一日侦探」限定徽章</div>
    </div>
    
    <!-- 错题特训室 -->
    <div class="wrong-card" id="wrongTrainBtn">
      <div class="wrong-title">📚 错题特训室 · 魔鬼训练</div>
      <div class="wrong-desc">专攻你的历史错题，温故知新（无经验）</div>
    </div>
    
    <div class="mode-buttons"><button class="mode-btn btn-casual" id="casualBtn">🎉 休闲模式 · 随机15题</button><button class="mode-btn btn-reasoning" id="reasoningBtn">🔍 推理模式 · 26案件</button></div>
    <button class="secondary-btn" id="badgeHallBtn">🏅 徽章陈列室</button>
    
    <!-- 存档码按钮 -->
    <div class="archive-btns">
      <div class="archive-btn" id="exportSaveBtn">📤 生成存档码</div>
      <div class="archive-btn" id="importSaveBtn">📥 导入存档码</div>
    </div>
    
    <div class="sound-tip">🎵 点击任意按钮开启音效</div>
    <div class="memory-note">💡 错题排除永久保存 · 休闲/推理得经验 · 存档码可跨设备同步进度</div>
  </div>
  
  <div id="casePanel" class="panel">
    <div class="case-header"><button class="back-icon" id="caseBackBtn">←</button><span style="color:#f5c518;">📖 全26案件 · 每题都是细节</span><div style="width:36px;"></div></div>
    <div id="caseListContainer" class="case-grid"></div>
  </div>
  
  <div id="gamePanel" class="panel">
    <div class="quiz-info"><span id="gameModeLabel">休闲模式</span><span>⭐ <span id="currentScore">0</span> 分</span></div>
    <div class="progress-bar"><div class="progress-fill" id="gameProgress"></div></div>
    <div class="question-card"><div class="question-text" id="questionTxt"></div></div>
    <div class="options-area" id="optionsContainer"></div>
    <button class="next-btn hide" id="nextQuizBtn">下一题 →</button>
    <div class="feedback" id="feedbackMsg"></div>
  </div>
  
  <div id="resultPanel" class="panel">
    <div class="result-box"><div id="resultEmoji" style="font-size:52px;">🏆</div>
    <div class="result-score" id="finalScoreDisplay">0 分</div>
    <div class="result-stats" id="resultStats"></div>
    <div id="expGainDisplay" style="color:#f5c518; font-size:13px; margin:6px 0;"></div>
    <div id="newBadgeDisplay" class="badge-toast" style="display:none;"></div>
    <div class="share-card" id="shareBtn">📤 分享我的侦探档案</div>
    <div style="display:flex; gap:12px; margin-top:16px;"><button class="secondary-btn" id="resultMenuBtn" style="flex:1;">◀ 主菜单</button><button class="secondary-btn" id="resultRetryBtn" style="flex:1; background:#f97316; color:white;">🔄 重新挑战</button></div></div>
  </div>
  
  <div id="badgePanel" class="panel">
    <div class="case-header"><button class="back-icon" id="badgeBackBtn">←</button><span style="color:#f5c518;">🏅 侦探徽章</span><div style="width:36px;"></div></div>
    <div id="badgeGridContainer" class="badge-grid"></div>
  </div>
  
  <div id="flashEffect" class="flash-effect">🔍 真相只有一个！</div>
</div>

<script>
  // ==================== 音效系统 ====================
  let audioCtx = null;
  let soundReady = false;
  
  function initAudio() { if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
  function playSound(type) {
    if (!soundReady || !audioCtx || audioCtx.state !== 'running') return;
    const now = audioCtx.currentTime, osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine';
    gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
    if (type === 'door') { osc.frequency.setValueAtTime(440, now); osc.frequency.exponentialRampToValueAtTime(880, now + 0.2); }
    else if (type === 'badge') { osc.frequency.setValueAtTime(880, now); osc.frequency.exponentialRampToValueAtTime(1318, now + 0.15); }
    else if (type === 'complete') { osc.frequency.setValueAtTime(587, now); osc.frequency.setValueAtTime(784, now + 0.12); osc.frequency.setValueAtTime(988, now + 0.24); }
    else { osc.frequency.setValueAtTime(660, now); osc.frequency.exponentialRampToValueAtTime(440, now + 0.15); }
    osc.start(); osc.stop(now + 0.45);
  }
  function enableAudio() {
    if (soundReady) return;
    initAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().then(() => { soundReady = true; setTimeout(() => playSound('correct'), 50); }).catch(e=>{});
    else if (audioCtx) { soundReady = true; setTimeout(() => playSound('correct'), 50); }
  }
  document.body.addEventListener('touchstart', enableAudio, { once: true });
  document.body.addEventListener('click', enableAudio, { once: true });

  // ==================== 存储系统 ====================
  const STORAGE_KEYS = { badges: 'conan_badges_final', solved: 'conan_solved_final', excluded: 'conan_excluded_final', exp: 'conan_exp', daily: 'conan_daily' };
  let ownedBadges = [], solvedCases = [], excludedMap = new Map();
  
  // 等级系统变量
  let userExp = 0;
  const LEVELS = [
    { level: 1, name: "见习侦探", expNeeded: 100, icon: "🔍" },
    { level: 2, name: "巡查部长", expNeeded: 250, icon: "👮" },
    { level: 3, name: "警部补", expNeeded: 450, icon: "⭐" },
    { level: 4, name: "警部", expNeeded: 700, icon: "⭐⭐" },
    { level: 5, name: "警视正", expNeeded: 1000, icon: "⭐⭐⭐" },
    { level: 6, name: "警视长", expNeeded: 1400, icon: "🏅" },
    { level: 7, name: "警视监", expNeeded: 1900, icon: "🎖️" },
    { level: 8, name: "警视总监", expNeeded: 2500, icon: "🏆" },
    { level: 9, name: "传说侦探", expNeeded: 3200, icon: "🌟" },
    { level: 10, name: "柯南·真", expNeeded: 4000, icon: "🕵️" }
  ];
  
  function getCurrentLevel() { for(let i=LEVELS.length-1; i>=0; i--) if(userExp >= LEVELS[i].expNeeded) return LEVELS[i]; return LEVELS[0]; }
  function getNextLevelExp() { let lvl = getCurrentLevel(); let idx = LEVELS.findIndex(l => l.level === lvl.level); if(idx+1 < LEVELS.length) return LEVELS[idx+1].expNeeded; return lvl.expNeeded; }
  function updateRankUI() {
    let lvl = getCurrentLevel();
    let nextExp = getNextLevelExp();
    let expForCurrent = lvl.level === 1 ? 0 : (LEVELS.find(l => l.level === lvl.level-1)?.expNeeded || 0);
    let expProgress = ((userExp - expForCurrent) / (nextExp - expForCurrent)) * 100;
    document.getElementById("rankIcon").innerHTML = lvl.icon;
    document.getElementById("rankName").innerHTML = lvl.name;
    document.getElementById("rankTitle").innerHTML = lvl.icon + " 等级" + lvl.level + " · 侦探";
    document.getElementById("expFill").style.width = Math.min(100, expProgress) + "%";
    document.getElementById("expText").innerHTML = userExp + " / " + nextExp + " EXP";
  }
  
  function addExp(amount) {
    if(amount === 0) return;
    let oldLevel = getCurrentLevel().level;
    userExp += amount;
    let newLevel = getCurrentLevel().level;
    if(newLevel > oldLevel) {
      let toast = document.createElement("div");
      toast.className = "levelup-toast";
      toast.innerHTML = "🎉 晋升！" + LEVELS.find(l=>l.level===newLevel).name + " 🎉";
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 1500);
    }
    localStorage.setItem(STORAGE_KEYS.exp, JSON.stringify({exp:userExp}));
    updateRankUI();
  }
  
  // 每日悬赏
  let dailyCompleted = false;
  function updateDailyUI() {
    let today = new Date().toDateString();
    let saved = localStorage.getItem(STORAGE_KEYS.daily);
    if(saved) { let dc = JSON.parse(saved); if(dc.date === today) dailyCompleted = dc.completed; else dailyCompleted = false; }
    let btn = document.getElementById("dailyChallengeBtn");
    if(dailyCompleted) { btn.classList.add("daily-completed"); btn.querySelector(".daily-reward").innerHTML = "✅ 今日已完成！明日再来"; }
    else { btn.classList.remove("daily-completed"); btn.querySelector(".daily-reward").innerHTML = "🏅 奖励：「一日侦探」限定徽章 + 经验"; }
  }
  
  function loadData() {
    try {
      let b = localStorage.getItem(STORAGE_KEYS.badges); if(b) ownedBadges = JSON.parse(b);
      let s = localStorage.getItem(STORAGE_KEYS.solved); if(s) solvedCases = JSON.parse(s);
      let e = localStorage.getItem(STORAGE_KEYS.excluded);
      if(e) { let obj = JSON.parse(e); for(let[k,v] of Object.entries(obj)) excludedMap.set(k, new Set(v)); }
      let expData = localStorage.getItem(STORAGE_KEYS.exp);
      if(expData) { let p = JSON.parse(expData); userExp = p.exp || 0; updateRankUI(); }
      let d = localStorage.getItem(STORAGE_KEYS.daily);
      if(d) { let dc = JSON.parse(d); if(dc.date === new Date().toDateString()) dailyCompleted = dc.completed; else dailyCompleted = false; }
    } catch(e) {}
    updateDailyUI();
  }
  
  function saveAll() {
    localStorage.setItem(STORAGE_KEYS.badges, JSON.stringify(ownedBadges));
    localStorage.setItem(STORAGE_KEYS.solved, JSON.stringify(solvedCases));
    let excludedObj = {}; for(let[k,vSet] of excludedMap.entries()) excludedObj[k] = Array.from(vSet);
    localStorage.setItem(STORAGE_KEYS.excluded, JSON.stringify(excludedObj));
    localStorage.setItem(STORAGE_KEYS.daily, JSON.stringify({completed:dailyCompleted, date:new Date().toDateString()}));
  }
  
  function getQuestionId(question, mode, caseId = null) { return mode === 'casual' ? 'casual_' + question.q : 'case_' + caseId + '_' + question.q; }
  function addExcludedOption(questionId, optIndex) { let set = excludedMap.get(questionId); if (!set) { set = new Set(); excludedMap.set(questionId, set); } set.add(optIndex); saveAll(); }
  function isOptionExcluded(questionId, optIndex) { let set = excludedMap.get(questionId); return set ? set.has(optIndex) : false; }
  
  // 闪切和抖动
  function showFlashCorrect() { let el = document.getElementById("flashEffect"); el.classList.add("show"); setTimeout(()=>el.classList.remove("show"),500); }
  function shakeScreen() { document.body.style.animation = "shake 0.3s ease"; setTimeout(()=>document.body.style.animation="",300); }

  // 智能洗牌
  function shufflePickCasual(count = 15) {
    let availablePool = CASUAL_POOL.filter(q => {
      let qId = getQuestionId(q, 'casual');
      let excludedSet = excludedMap.get(qId);
      return !excludedSet || excludedSet.size < 3;
    });
    if (availablePool.length < count) availablePool = [...CASUAL_POOL];
    for (let i = availablePool.length - 1; i > 0; i--) {
      let j = Math.floor(Math.random() * (i + 1));
      [availablePool[i], availablePool[j]] = [availablePool[j], availablePool[i]];
    }
    return availablePool.slice(0, count);
  }
  
  // 游戏状态
  let gameMode = "", currentCase = null, currentQuestions = [], qIndex = 0, score = 0, answered = false, optionBtns = [];
  
  function showPanel(panelId) {
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    document.getElementById(panelId).classList.add("active");
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  
  function initOptionButtons() {
    let container = document.getElementById("optionsContainer");
    container.innerHTML = "";
    optionBtns = [];
    for (let i = 0; i < 4; i++) {
      let btn = document.createElement("button");
      btn.className = "option";
      container.appendChild(btn);
      optionBtns.push(btn);
    }
  }
  
  function handleAnswer(selectedIdx, qData, questionId, isReasoningMode) {
    if (answered) return;
    answered = true;
    let isCorrect = (selectedIdx === qData.ans);
    if (isCorrect) { score += 10; playSound('correct'); showFlashCorrect(); }
    else { if (!isReasoningMode) { addExcludedOption(questionId, selectedIdx); } shakeScreen(); }
    document.getElementById("currentScore").innerText = score;
    optionBtns.forEach((btn, idx) => {
      btn.classList.add("disabled");
      if (idx === qData.ans && (isReasoningMode || isCorrect)) btn.classList.add("correct");
      if (idx === selectedIdx && !isCorrect) btn.classList.add("wrong");
    });
    let fbDiv = document.getElementById("feedbackMsg");
    if (isReasoningMode) {
      fbDiv.innerHTML = isCorrect ? '<span class="fb-correct">✓ 正确！</span><br>' + (qData.detail || "") : '<span class="fb-wrong">✗ 错误</span><br>正确答案：' + qData.opts[qData.ans] + '<br>' + (qData.detail || "");
    } else {
      fbDiv.innerHTML = isCorrect ? '<span class="fb-correct">✓ 正确！</span><br>' + (qData.detail || "") : '<span class="fb-wrong">✗ 错误！该选项已被永久排除</span><br>' + (qData.detail ? "💡 " + qData.detail : "");
    }
    fbDiv.classList.add("show");
    document.getElementById("nextQuizBtn").classList.remove("hide");
  }
  
  function renderCurrent() {
    let q = currentQuestions[qIndex];
    let isReasoningMode = (gameMode === 'case');
    let questionId = isReasoningMode ? getQuestionId(q, 'case', currentCase.id) : getQuestionId(q, 'casual');
    document.getElementById("questionTxt").innerText = q.q;
    for (let i = 0; i < optionBtns.length; i++) {
      let isExcluded = !isReasoningMode && isOptionExcluded(questionId, i);
      optionBtns[i].textContent = q.opts[i] || "";
      optionBtns[i].className = "option";
      if (isExcluded) optionBtns[i].classList.add("disabled");
      optionBtns[i].onclick = () => { if (isExcluded) return; handleAnswer(i, q, questionId, isReasoningMode); };
    }
    document.getElementById("currentScore").innerText = score;
    document.getElementById("gameProgress").style.width = ((qIndex + 1) / currentQuestions.length) * 100 + "%";
    document.getElementById("nextQuizBtn").classList.add("hide");
    document.getElementById("feedbackMsg").classList.remove("show");
    answered = false;
  }
  
  function nextQuestion() { qIndex++; if (qIndex < currentQuestions.length) renderCurrent(); else endGame(); }
  
  // 错题特训室
  function startWrongTraining() {
    let wrongQuestions = [];
    for(let q of CASUAL_POOL) {
      let qId = getQuestionId(q, 'casual');
      let excluded = excludedMap.get(qId);
      if(excluded && excluded.size > 0) wrongQuestions.push({...q});
      if(wrongQuestions.length >= 10) break;
    }
    if(wrongQuestions.length === 0) { alert("暂无错题记录！先去休闲模式挑战吧~"); return; }
    gameMode = "wrongtrain";
    currentQuestions = wrongQuestions.slice(0,10);
    qIndex = 0; score = 0; answered = false;
    document.getElementById("gameModeLabel").innerHTML = "📖 错题特训室 · 魔鬼训练 (无经验)";
    showPanel("gamePanel");
    renderCurrent();
  }
  
  // 每日悬赏
  function startDailyChallenge() {
    if(dailyCompleted) { alert("今日悬赏已完成！明天会有新案件~"); return; }
    let hardQuestions = [...CASUAL_POOL].sort(()=>0.5-Math.random()).slice(0,5);
    gameMode = "daily";
    currentQuestions = hardQuestions;
    qIndex = 0; score = 0; answered = false;
    document.getElementById("gameModeLabel").innerHTML = "📅 本日悬赏 · 全对得勋章+经验";
    showPanel("gamePanel");
    renderCurrent();
  }
  
  function endGame() {
    let total = currentQuestions.length * 10;
    let percent = Math.floor((score / total) * 100);
    
    let expGain = 0;
    let newBadge = null;
    
    // 根据模式计算经验值
    if (gameMode === "casual") {
      expGain = Math.floor(percent * 1.5) + 10;
      addExp(expGain);
      if (percent >= 65 && !ownedBadges.includes("b01")) {
        ownedBadges.push("b01");
        newBadge = "基础侦探";
        playSound('badge');
      }
    } else if (gameMode === "case") {
      expGain = Math.floor(percent * 1.5) + 10;
      addExp(expGain);
      if (currentCase && !solvedCases.includes(currentCase.id) && percent >= 65) {
        solvedCases.push(currentCase.id);
        if (currentCase.badge && !ownedBadges.includes(currentCase.badge)) {
          ownedBadges.push(currentCase.badge);
          let bb = BADGES_LIST.find(b => b.id === currentCase.badge);
          if (bb) newBadge = bb.name;
          playSound('badge');
        }
      }
      if (solvedCases.length === 5 && !ownedBadges.includes("b09")) {
        ownedBadges.push("b09");
        newBadge = "连续破案·五章";
        playSound('badge');
      }
      if (solvedCases.length === 15 && !ownedBadges.includes("b10")) {
        ownedBadges.push("b10");
        newBadge = "传说侦探";
        playSound('badge');
      }
    } else if (gameMode === "daily") {
      if (percent === 100 && !dailyCompleted && !ownedBadges.includes("daily_badge")) {
        expGain = Math.floor(percent * 1.5) + 20;
        addExp(expGain);
        ownedBadges.push("daily_badge");
        newBadge = "一日侦探";
        dailyCompleted = true;
        playSound('badge');
        localStorage.setItem(STORAGE_KEYS.daily, JSON.stringify({completed:true, date:new Date().toDateString()}));
        updateDailyUI();
      } else {
        expGain = 0;
      }
    } else if (gameMode === "wrongtrain") {
      expGain = 0;
    }
    
    // 更新结果页面
    document.getElementById("resultEmoji").innerHTML = percent >= 80 ? "🏆" : (percent >= 50 ? "🔍" : "📖");
    document.getElementById("finalScoreDisplay").innerHTML = score + "/" + total + " (" + percent + "分)";
    document.getElementById("resultStats").innerHTML = "正确率 " + percent + "% " + (percent >= 70 ? "侦探评级A" : "继续加油");
    document.getElementById("expGainDisplay").innerHTML = expGain > 0 ? "✨ +" + expGain + " 经验值 ✨" : (gameMode === "wrongtrain" ? "📖 特训模式 · 不获得经验值" : "");
    
    saveAll();
    showPanel("resultPanel");
    
    if (newBadge) {
      let bd = document.getElementById("newBadgeDisplay");
      bd.innerText = "✨ 获得徽章 · " + newBadge + " ✨";
      bd.style.display = "inline-block";
      setTimeout(() => bd.style.display = "none", 3000);
    } else {
      document.getElementById("newBadgeDisplay").style.display = "none";
    }
    checkAllBadgesComplete();
  }
  
  function checkAllBadgesComplete() {
    if (ownedBadges.length === BADGES_LIST.length + 2 && !window._allBadgePlayed) {
      window._allBadgePlayed = true;
      playSound('complete');
    }
  }

    win.document.write(`

      <body><h3>📤 您的存档码</h3><p style="font-size:12px;color:#aaa;">复制下方代码，在新设备点击「导入存档码」粘贴</p><textarea id="code" readonly>${base64}</textarea><br><button onclick="navigator.clipboard.writeText(document.getElementById('code').value);alert('已复制！');">📋 复制代码</button><button onclick="window.close()">关闭</button><p style="font-size:10px;color:#666;margin-top:16px;">⚠️ 请妥善保存此代码</p></body></html>
    `);
  }
  
  function importSaveCode() {
    let code = prompt("📥 请输入存档码：\n\n（粘贴您之前保存的代码）");
    if (!code) return;
    try {
      let jsonStr = decodeURIComponent(atob(code));
      let saveData = JSON.parse(jsonStr);
      ownedBadges = saveData.badges || [];
      solvedCases = saveData.solved || [];
      userExp = saveData.exp || 0;
      excludedMap.clear();
      if (saveData.excluded) {
        for (let [k, vArr] of Object.entries(saveData.excluded)) {
          excludedMap.set(k, new Set(vArr));
        }
      }
      if (saveData.daily) {
        let today = new Date().toDateString();
        if (saveData.daily.date === today) dailyCompleted = saveData.daily.completed;
        else dailyCompleted = false;
      }
      localStorage.setItem(STORAGE_KEYS.badges, JSON.stringify(ownedBadges));
      localStorage.setItem(STORAGE_KEYS.solved, JSON.stringify(solvedCases));
      let excludedObj = {};
      for (let [k, vSet] of excludedMap.entries()) excludedObj[k] = Array.from(vSet);
      localStorage.setItem(STORAGE_KEYS.excluded, JSON.stringify(excludedObj));
      localStorage.setItem(STORAGE_KEYS.exp, JSON.stringify({exp: userExp}));
      localStorage.setItem(STORAGE_KEYS.daily, JSON.stringify({completed: dailyCompleted, date: new Date().toDateString()}));
      updateRankUI();
      updateDailyUI();
      alert("✅ 存档导入成功！所有进度已恢复。");
      location.reload();
    } catch(e) {
      alert("❌ 存档码无效！请检查是否完整复制。");
    }
  }
  
  // 绑定事件
  document.getElementById("casualBtn").onclick = startCasual;
  document.getElementById("reasoningBtn").onclick = () => { renderCaseList(); showPanel("casePanel"); };
  document.getElementById("badgeHallBtn").onclick = () => { buildBadgeHall(); showPanel("badgePanel"); };
  document.getElementById("caseBackBtn").onclick = () => showPanel("mainMenuPanel");
  document.getElementById("badgeBackBtn").onclick = () => showPanel("mainMenuPanel");
  document.getElementById("nextQuizBtn").onclick = nextQuestion;
  document.getElementById("resultMenuBtn").onclick = () => showPanel("mainMenuPanel");
  document.getElementById("resultRetryBtn").onclick = () => { if (gameMode === "casual") startCasual(); else if (gameMode === "case" && currentCase) startCase(currentCase); else if (gameMode === "daily") startDailyChallenge(); else if (gameMode === "wrongtrain") startWrongTraining(); };
  document.getElementById("dailyChallengeBtn").onclick = startDailyChallenge;
  document.getElementById("wrongTrainBtn").onclick = startWrongTraining;
  document.getElementById("shareBtn").onclick = shareResult;
  document.getElementById("exportSaveBtn").onclick = generateSaveCode;
  document.getElementById("importSaveBtn").onclick = importSaveCode;
  
  let doorBox = document.getElementById("doorBox");
  doorBox.addEventListener("click", () => { doorBox.classList.add("door-open"); playSound('door'); setTimeout(() => { doorBox.style.opacity = "0.3"; doorBox.style.pointerEvents = "none"; }, 700); });
  
  loadData();
  initOptionButtons();
  showPanel("mainMenuPanel");
</script>
</body>
